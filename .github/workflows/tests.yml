name: Tests

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    # PostgreSQL service container for database tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123 # Matches TEST_PASSWORD in conftest.py
        ports:
          - 5432:5432
        # Ensure PostgreSQL is ready before steps start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gobject-introspection \
            gir1.2-gtk-4.0 \
            gir1.2-gtksource-5 \
            python3-dev \
            python3-gi \
            python3-gi-cairo \
            libffi-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install flake8-pyproject keyrings.alt 

      - name: Run flake8 (optional)
        run: |
          flake8 src/ --count --statistics || true

      - name: Run mypy
        run: |
          mypy src/

      - name: Run black (check formatting)
        run: |
          black --check src/ tests/

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
