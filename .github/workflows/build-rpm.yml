name: Build RPM

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - feat/*
  pull_request:
    branches:
      - main
      - stage

jobs:
  build:
    name: Build RPM Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies (GTK4 + build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gobject-introspection \
            gir1.2-gtk-4.0 \
            gir1.2-gtksource-5 \
            python3-dev \
            python3-gi \
            python3-gi-cairo \
            libffi-dev \
            libssl-dev \
            pkg-config \
            rpm \
            rpm2cpio \
            cpio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install build
          pip install .

      - name: Build RPM
        run: |
          chmod +x scripts/packaging/build_rpm.sh
          ./scripts/packaging/build_rpm.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: |
            *.rpm
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
